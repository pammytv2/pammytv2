<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="'JetBrains Mono','Fira Code','Cascadia Code',Consolas,monospace">
  <defs>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#ffffff" opacity="0.02"/>
    </pattern>
  </defs>

  <style>
    text { font-size: 17px; }
    .dim    { fill: #8b949e; }
    .prompt { fill: #f0abfc; font-weight: bold; }
    .cmd    { fill: #e6edf3; }
    .teal   { fill: #14b8a6; }
    .out    { fill: #7dd3fc; }
    .ok     { fill: #4ade80; font-weight: bold; }
    .type { clip-path: inset(0 100% 0 0); animation: type .9s steps(26,end) forwards; }
    .fade { opacity: 0; animation: fade .35s ease-out forwards; }
    .d1 { animation-delay: .4s; }
    .d2 { animation-delay: 1.5s; }
    .d3 { animation-delay: 2.1s; }
    .d4 { animation-delay: 3.2s; }
    .d5 { animation-delay: 3.8s; }
    .d6 { animation-delay: 4.9s; }
    .d7 { animation-delay: 6.9s; }
    .d8 { animation-delay: 7.4s; }
    .cursor { animation: blink 1.1s steps(2,start) infinite; }
    .fill { animation: grow 1.8s ease-out 5s forwards; }
    @keyframes type { to { clip-path: inset(0 -2% 0 0); } }
    @keyframes fade { to { opacity: 1; } }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes grow { from { width: 0; } to { width: 300px; } }
  </style>

  <!-- window -->
  <rect x="18" y="14" width="824" height="392" rx="14" fill="#0d1117" stroke="url(#border)" stroke-width="1.6" filter="url(#glow)"/>
  <rect x="18" y="14" width="824" height="392" rx="14" fill="url(#scan)"/>

  <!-- title bar -->
  <circle cx="46" cy="42" r="6.5" fill="#ff5f57"/>
  <circle cx="68" cy="42" r="6.5" fill="#febc2e"/>
  <circle cx="90" cy="42" r="6.5" fill="#28c840"/>
  <text x="430" y="48" text-anchor="middle" class="dim" font-size="14">natchaphon@rmutl: ~/portfolio</text>
  <line x1="18" y1="64" x2="842" y2="64" stroke="#21262d" stroke-width="1"/>

  <!-- line 1 -->
  <g class="type d1">
    <text x="46" y="104"><tspan class="prompt">&#10095;</tspan><tspan dx="12" class="cmd">whoami</tspan></text>
  </g>
  <g class="fade d2">
    <text x="46" y="134" class="teal" font-size="21" font-weight="bold">Natchaphon &#8212; Backend &#183; Mobile &#183; Game Developer</text>
  </g>

  <!-- line 2 -->
  <g class="type d3">
    <text x="46" y="180"><tspan class="prompt">&#10095;</tspan><tspan dx="12" class="cmd">cat about.txt</tspan></text>
  </g>
  <g class="fade d4">
    <text x="46" y="210" class="out">&#127891; Computer Engineering @ RMUTL &#160;&#183;&#160; &#128205; Chiang Mai, Thailand</text>
    <text x="46" y="238" class="out">&#9889; Full-Stack &#183; Flutter &#183; Unity &#183; DevOps &amp; Cloud</text>
  </g>

  <!-- line 3 -->
  <g class="type d5">
    <text x="46" y="284"><tspan class="prompt">&#10095;</tspan><tspan dx="12" class="cmd">./daily_routine.sh</tspan></text>
  </g>
  <g class="fade d6">
    <text x="46" y="314" class="dim">brewing coffee &#9749; &#8594; compiling code &#128187;</text>
    <rect x="46" y="328" width="300" height="10" rx="5" fill="#21262d"/>
    <rect x="46" y="328" height="10" rx="5" fill="url(#bar)" class="fill" width="0"/>
  </g>
  <g class="fade d7">
    <text x="362" y="337" class="ok" font-size="15">[ OK ] 100%</text>
  </g>

  <!-- final prompt -->
  <g class="fade d8">
    <text x="46" y="378"><tspan class="prompt">&#10095;</tspan><tspan dx="12" class="dim">ready to collaborate&#8230;</tspan></text>
    <rect x="310" y="364" width="11" height="19" fill="#14b8a6" class="cursor"/>
  </g>
</svg>
