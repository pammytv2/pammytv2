<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#191527"/>
      <stop offset="60%" stop-color="#2b2342"/>
      <stop offset="100%" stop-color="#4a3b63"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2d0a4"/>
      <stop offset="60%" stop-color="#e8a4ae"/>
      <stop offset="100%" stop-color="#d98a9e"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0ede5"/>
      <stop offset="50%" stop-color="#bcd0e5"/>
      <stop offset="100%" stop-color="#d9a8b8"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f2d0a4" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#f2d0a4" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="sunclip"><circle cx="430" cy="138" r="80"/></clipPath>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .grid { stroke: #8a76ab; stroke-width: 1; opacity: .45; }
    .star { animation: tw 3s ease-in-out infinite; }
    .t2 { animation-delay: 1s; } .t3 { animation-delay: 2s; }
    @keyframes tw { 0%,100% { opacity: .15; } 50% { opacity: .8; } }
    .sunmove { animation: rise 7s ease-in-out infinite alternate; }
    @keyframes rise { from { transform: translateY(0); } to { transform: translateY(-6px); } }
    /* car drive + wheel spin use SMIL animateTransform below */
    .tagline { animation: tw 3.4s ease-in-out infinite; }
  </style>

  <rect width="860" height="340" fill="url(#sky)"/>

  <!-- stars -->
  <circle cx="120" cy="55" r="1.8" fill="#e8e3f0" class="star"/>
  <circle cx="240" cy="92" r="1.4" fill="#e8e3f0" class="star t2"/>
  <circle cx="700" cy="50" r="1.8" fill="#e8e3f0" class="star t3"/>
  <circle cx="780" cy="112" r="1.4" fill="#e8e3f0" class="star"/>
  <circle cx="92" cy="140" r="1.4" fill="#e8e3f0" class="star t3"/>
  <circle cx="640" cy="122" r="1.4" fill="#e8e3f0" class="star t2"/>

  <!-- sun -->
  <g class="sunmove">
    <circle cx="430" cy="138" r="80" fill="url(#sun)" opacity=".9"/>
    <g clip-path="url(#sunclip)">
      <rect x="335" y="146" width="200" height="6" fill="#2b2342"/>
      <rect x="335" y="165" width="200" height="8" fill="#2b2342"/>
      <rect x="335" y="188" width="200" height="10" fill="#2b2342"/>
    </g>
  </g>

  <!-- horizon grid -->
  <g class="grid">
    <line x1="0" y1="242" x2="860" y2="242"/>
    <line x1="0" y1="257" x2="860" y2="257"/>
    <line x1="0" y1="279" x2="860" y2="279"/>
    <line x1="0" y1="310" x2="860" y2="310"/>
    <line x1="430" y1="242" x2="430" y2="340"/>
    <line x1="430" y1="242" x2="260" y2="340"/>
    <line x1="430" y1="242" x2="600" y2="340"/>
    <line x1="430" y1="242" x2="90" y2="340"/>
    <line x1="430" y1="242" x2="770" y2="340"/>
    <line x1="430" y1="242" x2="0" y2="298"/>
    <line x1="430" y1="242" x2="860" y2="298"/>
  </g>
  <rect y="240" width="860" height="3" fill="#c495ab" opacity=".55"/>

  <!-- name -->
  <text x="430" y="160" text-anchor="middle" fill="url(#chrome)" stroke="#191527" stroke-width="1.2" font-size="62" font-weight="900" font-family="Arial Black,Arial,sans-serif" letter-spacing="4" filter="url(#soft)">NATCHAPHON</text>
  <text x="430" y="194" text-anchor="middle" fill="#f2d0a4" font-size="15" font-family="'Courier New',monospace" font-weight="bold" letter-spacing="6">BACKEND &#183; MOBILE &#183; GAME DEV</text>
  <text x="430" y="220" text-anchor="middle" fill="#cfc6de" font-size="12" font-family="'Courier New',monospace" letter-spacing="3" opacity=".8">RMUTL &#9670; CHIANG MAI, THAILAND</text>

  <!-- retro car driving across the grid -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="-180 0" to="1040 0" dur="9s" repeatCount="indefinite"/>
    <g transform="translate(0,276)">
      <!-- headlight beam -->
      <polygon points="143,9 215,15 143,21" fill="url(#beam)"/>
      <!-- soft underglow -->
      <ellipse cx="72" cy="36" rx="66" ry="5" fill="#c495ab" opacity=".25"/>
      <!-- body -->
      <path d="M3 21 Q3 13 13 11 L30 9 L47 -3 Q50 -6 57 -6 L86 -6 Q92 -6 96 -2 L109 9 L132 12 Q141 13 141 19 Q141 25 133 25 L11 25 Q3 25 3 21 Z" fill="#241d33" stroke="#9b8ab8" stroke-width="1.2"/>
      <!-- windows -->
      <path d="M51 -2 Q53 -4 58 -4 L84 -4 Q88 -4 91 -1 L100 7 L48 7 Z" fill="#8fb8d8" opacity=".55"/>
      <!-- side stripe -->
      <line x1="10" y1="15" x2="134" y2="15" stroke="#d9a8b8" stroke-width="2" opacity=".8"/>
      <!-- tail light -->
      <rect x="3" y="12" width="4" height="6" rx="1" fill="#d98a9e"/>
      <!-- headlight -->
      <rect x="136" y="12" width="5" height="5" rx="1" fill="#f2d0a4"/>
      <!-- wheels -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0 36 25" to="360 36 25" dur="0.6s" repeatCount="indefinite"/>
        <circle cx="36" cy="25" r="10" fill="#191527" stroke="#9b8ab8" stroke-width="2"/>
        <line x1="36" y1="17" x2="36" y2="33" stroke="#9b8ab8" stroke-width="1.4"/>
        <line x1="28" y1="25" x2="44" y2="25" stroke="#9b8ab8" stroke-width="1.4"/>
      </g>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0 108 25" to="360 108 25" dur="0.6s" repeatCount="indefinite"/>
        <circle cx="108" cy="25" r="10" fill="#191527" stroke="#9b8ab8" stroke-width="2"/>
        <line x1="108" y1="17" x2="108" y2="33" stroke="#9b8ab8" stroke-width="1.4"/>
        <line x1="100" y1="25" x2="116" y2="25" stroke="#9b8ab8" stroke-width="1.4"/>
      </g>
    </g>
  </g>

  <text x="430" y="332" text-anchor="middle" fill="#cfa8bf" font-size="12" font-family="'Courier New',monospace" letter-spacing="4" class="tagline">&#9654; RIDING THE GRID SINCE 2004 &#9664;</text>
</svg>
