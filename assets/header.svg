<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12002b"/>
      <stop offset="60%" stop-color="#3b0f5e"/>
      <stop offset="100%" stop-color="#8e2de2"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd94d"/>
      <stop offset="55%" stop-color="#ff6ec7"/>
      <stop offset="100%" stop-color="#ff2ea6"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f7ff"/>
      <stop offset="48%" stop-color="#7dd3fc"/>
      <stop offset="52%" stop-color="#ff6ec7"/>
      <stop offset="100%" stop-color="#ff2ea6"/>
    </linearGradient>
    <clipPath id="sunclip"><circle cx="430" cy="140" r="85"/></clipPath>
    <filter id="pglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .grid { stroke: #ff2ea6; stroke-width: 1.2; opacity: .7; }
    .star { animation: tw2 2.4s ease-in-out infinite; }
    .t2 { animation-delay: .8s; } .t3 { animation-delay: 1.6s; } .t4 { animation-delay: 1.2s; }
    @keyframes tw2 { 0%,100% { opacity: .2; } 50% { opacity: 1; } }
    .sunmove { animation: rise 6s ease-in-out infinite alternate; }
    @keyframes rise { from { transform: translateY(0); } to { transform: translateY(-7px); } }
    .neonline { animation: pulse 2.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .9; } 50% { opacity: .45; } }
    .tagline { animation: tw2 3s ease-in-out infinite; }
  </style>

  <rect width="860" height="340" fill="url(#sky)"/>

  <!-- stars -->
  <circle cx="120" cy="55" r="2" fill="#fff" class="star"/>
  <circle cx="240" cy="90" r="1.5" fill="#fff" class="star t2"/>
  <circle cx="700" cy="50" r="2" fill="#fff" class="star t3"/>
  <circle cx="780" cy="110" r="1.5" fill="#fff" class="star t4"/>
  <circle cx="90" cy="140" r="1.5" fill="#fff" class="star t3"/>
  <circle cx="640" cy="120" r="1.5" fill="#fff" class="star"/>
  <circle cx="180" cy="170" r="1.5" fill="#fff" class="star t4"/>

  <!-- sun with stripes -->
  <g class="sunmove">
    <circle cx="430" cy="140" r="85" fill="url(#sun)" filter="url(#pglow)"/>
    <g clip-path="url(#sunclip)">
      <rect x="330" y="150" width="200" height="7" fill="#12002b"/>
      <rect x="330" y="170" width="200" height="9" fill="#12002b"/>
      <rect x="330" y="193" width="200" height="11" fill="#12002b"/>
    </g>
  </g>

  <!-- horizon grid -->
  <g class="grid">
    <line x1="0" y1="245" x2="860" y2="245"/>
    <line x1="0" y1="260" x2="860" y2="260"/>
    <line x1="0" y1="282" x2="860" y2="282"/>
    <line x1="0" y1="312" x2="860" y2="312"/>
    <line x1="430" y1="245" x2="430" y2="340"/>
    <line x1="430" y1="245" x2="260" y2="340"/>
    <line x1="430" y1="245" x2="600" y2="340"/>
    <line x1="430" y1="245" x2="90" y2="340"/>
    <line x1="430" y1="245" x2="770" y2="340"/>
    <line x1="430" y1="245" x2="0" y2="300"/>
    <line x1="430" y1="245" x2="860" y2="300"/>
  </g>
  <rect y="243" width="860" height="4" fill="#ff6ec7" class="neonline"/>

  <!-- chrome name -->
  <text x="430" y="162" text-anchor="middle" fill="url(#chrome)" stroke="#12002b" stroke-width="1.5" font-size="64" font-weight="900" font-family="Arial Black,Arial,sans-serif" letter-spacing="4" filter="url(#pglow)">NATCHAPHON</text>
  <text x="430" y="196" text-anchor="middle" fill="#ffd94d" font-size="16" font-family="'Courier New',monospace" font-weight="bold" letter-spacing="6">BACKEND &#183; MOBILE &#183; GAME DEV</text>
  <text x="430" y="222" text-anchor="middle" fill="#e0f7ff" font-size="12" font-family="'Courier New',monospace" letter-spacing="3" opacity=".85">RMUTL &#9670; CHIANG MAI, THAILAND</text>

  <text x="430" y="330" text-anchor="middle" fill="#ff9de2" font-size="12" font-family="'Courier New',monospace" letter-spacing="4" class="tagline">&#9654; RIDING THE GRID SINCE 2004 &#9664;</text>
</svg>
